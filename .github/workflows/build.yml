# Build the firmware on every push — no local toolchain needed. Produces the app
# image + a single merged image, uploaded as artifacts (and attached to a Release on
# a tag push). Download a .bin, then flash it with tools/flash.py --bin <file>.
#
# Works out of the box for public app repos (apps.yaml). For a PRIVATE app repo, add a
# repo secret GH_PAT (a token with access) and uncomment the git-auth step below.
name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # For private app/core repos: authenticate git clones over HTTPS with a PAT.
      # - name: Git auth for private repos
      #   if: ${{ secrets.GH_PAT != '' }}
      #   run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Build firmware (ESP-IDF, esp32c3)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: esp32c3
          # reconfigure fetches deps (core + apps via git); drop lvgl's stray preset;
          # build; then merge into one flashable image.
          command: >-
            idf.py reconfigure &&
            rm -f managed_components/lvgl__lvgl/CMakePresets.json &&
            idf.py build &&
            idf.py merge-bin -o firmware-merged.bin

      - name: Collect firmware
        run: |
          mkdir -p out
          # the single flashable image (python tools/flash.py --bin <file>) ...
          cp firmware-merged.bin out/ 2>/dev/null || cp build/firmware-merged.bin out/ 2>/dev/null || true
          # ... and the app image alone (for LAN OTA via tools/ota_serve.py)
          cp build/taskmaster_c3_app.bin out/ 2>/dev/null || true
          ls -la out

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: firmware
          path: out/*.bin
          if-no-files-found: error

      - name: Publish Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.bin
